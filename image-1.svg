<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="100%">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#AEABA5" />
    </marker>
  </defs>

  <!-- Left Plane -->
  <polygon points="40,80 40,240 160,180 160,20" fill="#E9E6E0" opacity="0.4" stroke="#AEABA5" stroke-width="1" />
  <text x="50" y="225" font-family="serif" font-size="16" fill="#6B6965">ℝⁿ</text>
  
  <!-- Right Plane -->
  <polygon points="440,80 440,240 560,180 560,20" fill="#E9E6E0" opacity="0.4" stroke="#AEABA5" stroke-width="1" />
  <text x="520" y="215" font-family="serif" font-size="16" fill="#6B6965">ℝᵐ</text>

  <!-- Nodes Left -->
  <circle cx="100" cy="80" r="3" fill="#2E2D2B" />
  <text x="85" y="75" font-family="serif" font-style="italic" font-weight="bold" font-size="15" fill="#2E2D2B">x</text>

  <circle cx="110" cy="170" r="3" fill="#2E2D2B" />
  <text x="95" y="165" font-family="serif" font-weight="bold" font-size="15" fill="#2E2D2B">u</text>

  <circle cx="90" cy="130" r="3" fill="#2E2D2B" />
  <text x="75" y="125" font-family="serif" font-weight="bold" font-size="15" fill="#2E2D2B">0</text>

  <!-- Nodes Right -->
  <circle cx="500" cy="90" r="3" fill="#2E2D2B" />
  <text x="510" y="85" font-family="serif" font-weight="bold" font-size="15" fill="#2E2D2B">b</text>

  <circle cx="490" cy="150" r="3" fill="#2E2D2B" />
  <text x="500" y="145" font-family="serif" font-weight="bold" font-size="15" fill="#2E2D2B">0</text>

  <!-- Arrows -->
  <path d="M 105 78 Q 300 20 493 88" fill="none" stroke="#AEABA5" stroke-width="1.5" marker-end="url(#arrow)" />
  <text x="300" y="45" font-family="sans-serif" font-size="12" fill="#6B6965" text-anchor="middle">multiplicación por A</text>

  <path d="M 115 168 Q 300 120 483 150" fill="none" stroke="#AEABA5" stroke-width="1.5" marker-end="url(#arrow)" />
  <text x="300" y="130" font-family="sans-serif" font-size="12" fill="#6B6965" text-anchor="middle">multiplicación por A</text>
</svg>
