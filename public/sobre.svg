<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250" width="100%">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#AEABA5" />
    </marker>
  </defs>
  
  <!-- Set A (Dominio) -->
  <ellipse cx="150" cy="120" rx="70" ry="90" fill="#F5F3EF" stroke="#AEABA5" stroke-width="2" stroke-dasharray="4" opacity="0.8" />
  <text x="150" y="240" font-family="sans-serif" font-size="14" fill="#6B6965" text-anchor="middle">Dominio (ℝⁿ)</text>
  
  <!-- Set B (Codominio = Rango) -->
  <ellipse cx="450" cy="120" rx="70" ry="90" fill="#E9E6E0" stroke="#2E2D2B" stroke-width="2" />
  <text x="450" y="240" font-family="sans-serif" font-size="14" fill="#2E2D2B" font-weight="600" text-anchor="middle">Codominio = Rango (ℝᵐ)</text>

  <!-- Points & Mappings -->
  <circle cx="150" cy="60" r="4" fill="#2E2D2B" />
  <circle cx="130" cy="120" r="4" fill="#2E2D2B" />
  <circle cx="170" cy="160" r="4" fill="#2E2D2B" />

  <circle cx="450" cy="70" r="4" fill="#2E2D2B" />
  <circle cx="430" cy="130" r="4" fill="#2E2D2B" />
  <circle cx="470" cy="150" r="4" fill="#2E2D2B" />

  <!-- Arrows -->
  <path d="M 155 60 Q 300 30 443 68" fill="none" stroke="#AEABA5" stroke-width="1.5" marker-end="url(#arrow)" />
  <path d="M 135 120 Q 300 120 423 128" fill="none" stroke="#AEABA5" stroke-width="1.5" marker-end="url(#arrow)" />
  <path d="M 175 160 Q 300 190 463 152" fill="none" stroke="#AEABA5" stroke-width="1.5" marker-end="url(#arrow)" />
</svg>
