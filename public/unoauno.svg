<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250" width="100%">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#AEABA5" />
    </marker>
  </defs>
  
  <!-- Set A (Dominio) -->
  <ellipse cx="150" cy="120" rx="70" ry="90" fill="#F5F3EF" stroke="#AEABA5" stroke-width="2" opacity="0.8" />
  <text x="150" y="240" font-family="sans-serif" font-size="14" fill="#6B6965" text-anchor="middle">Dominio (ℝⁿ)</text>
  
  <!-- Set B (Codominio) -->
  <ellipse cx="450" cy="120" rx="70" ry="90" fill="#F5F3EF" stroke="#AEABA5" stroke-width="2" opacity="0.8" />
  <text x="450" y="240" font-family="sans-serif" font-size="14" fill="#6B6965" text-anchor="middle">Codominio (ℝᵐ)</text>

  <!-- Rango area (Sub-area in B) -->
  <ellipse cx="450" cy="120" rx="40" ry="60" fill="#E9E6E0" stroke="#AEABA5" stroke-width="1" stroke-dasharray="4" />

  <!-- Points & Labels -->
  <circle cx="150" cy="80" r="4" fill="#2E2D2B" />
  <text x="130" y="75" font-family="serif" font-style="italic" font-weight="bold" font-size="14" fill="#2E2D2B">x₁</text>

  <circle cx="150" cy="160" r="4" fill="#2E2D2B" />
  <text x="130" y="175" font-family="serif" font-style="italic" font-weight="bold" font-size="14" fill="#2E2D2B">x₂</text>

  <!-- Points mapping distinctly -->
  <circle cx="450" cy="80" r="4" fill="#2E2D2B" />
  <text x="465" y="85" font-family="serif" font-style="italic" font-weight="bold" font-size="14" fill="#2E2D2B">T(x₁)</text>

  <circle cx="450" cy="160" r="4" fill="#2E2D2B" />
  <text x="465" y="165" font-family="serif" font-style="italic" font-weight="bold" font-size="14" fill="#2E2D2B">T(x₂)</text>

  <!-- Arrows -->
  <path d="M 155 80 Q 300 50 443 78" fill="none" stroke="#6B6965" stroke-width="1.5" marker-end="url(#arrow)" />
  <path d="M 155 160 Q 300 190 443 162" fill="none" stroke="#6B6965" stroke-width="1.5" marker-end="url(#arrow)" />
</svg>
